##### ~/.tmux.conf
##### Minimal + Catppuccin Mocha

### Prefix & reload
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

### Terminal & input
set -g default-terminal "tmux-256color"

# Truecolor
set -sa terminal-features ",xterm-256color:RGB"
set -sa terminal-features ",kitty:RGB"

set -g focus-events on
set -g escape-time 10

### Behavior
set -g history-limit 100000
set -g mouse on
set -g set-clipboard on

set -g renumber-windows on
set -g allow-rename off
set -g automatic-rename off
setw -g automatic-rename off

set -g base-index 1
setw -g pane-base-index 1

### Status bar (Catppuccin Mocha)
set -g status on
set -g status-position top
set -g status-interval 5
set -g status-justify left

set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g message-style "bg=#313244,fg=#cdd6f4"
set -g mode-style "bg=#cba6f7,fg=#1e1e2e"

set -g status-left-length 40
set -g status-right-length 80

set -g status-left "#[fg=#89b4fa,bold]#S#[default]"
set -g status-right "#[fg=#a6adc8]#{b:pane_current_path}#[default]"

### Window list
setw -g window-status-style "bg=#1e1e2e,fg=#6c7086"
setw -g window-status-current-style "bg=#1e1e2e,fg=#cdd6f4"
setw -g window-status-activity-style "bg=#1e1e2e,fg=#f9e2af"
setw -g window-status-bell-style "bg=#1e1e2e,fg=#f38ba8"

setw -g window-status-separator " "

setw -g window-status-format "#[fg=#6c7086] #I:#W #[default]"
setw -g window-status-current-format "#[fg=#cdd6f4,bold] #I:#W #[default]"

### Panes
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

setw -g pane-border-status off

### Splits
bind | split-window -h
bind - split-window -v

### Pane navigation
bind H select-pane -L
bind J select-pane -D
bind K select-pane -U
bind L select-pane -R

### Window navigation
bind h previous-window
bind l next-window

### Toggle last pane
bind \\ select-pane -l

### Easier config editing
bind e new-window -n config "$EDITOR ~/.tmux.conf"
