### Prefix & reload
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

### Terminal & input
set -g default-terminal "tmux-256color"

# Truecolor
set -sa terminal-features ",xterm-256color:RGB"
set -sa terminal-features ",kitty:RGB"

set -g focus-events on
set -g escape-time 10
set -g xterm-keys on
set -s extended-keys always
set -s extended-keys-format csi-u
set -as terminal-features ",xterm*:extkeys"
set -as terminal-features ",kitty:extkeys"

### Let Neovim handle mappings
unbind-key -q -n C--
unbind-key -q -n C-=
unbind-key -q C--
unbind-key -q C-=
unbind-key -q -n n

### Behavior
set -g history-limit 100000
set -g mouse on
set -g set-clipboard on

set -g renumber-windows on
set -g allow-rename off
set -g automatic-rename off
setw -g automatic-rename off

set -g base-index 1
setw -g pane-base-index 1

### Status bar
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify left

set -g status-style "bg=default,fg=#a89984"
set -g message-style "bg=#3c3836,fg=#ebdbb2"
set -g mode-style "bg=#83a598,fg=#282828"

set -g status-left-length 20
set -g status-right-length 50

set -g status-left "#[fg=#83a598] #S #[default]"
set -g status-right "#[fg=#928374]#{b:pane_current_path} #[default]"

### Window list
setw -g window-status-style "bg=default,fg=#928374"
setw -g window-status-current-style "bg=default,fg=#ebdbb2"
setw -g window-status-activity-style "bg=default,fg=#fabd2f"
setw -g window-status-bell-style "bg=default,fg=#fb4934"

setw -g window-status-separator " "

setw -g window-status-format "#[fg=#928374]#I:#W#[default]"
setw -g window-status-current-format "#[fg=#ebdbb2]#I:#W#[default]"

### Panes
set -g pane-border-style "fg=#3c3836"
set -g pane-active-border-style "fg=#83a598"

setw -g pane-border-status off

### Splits
bind | split-window -h
bind \\ split-window -v

### Pane navigation
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

## Windows
bind n new-window
bind q kill-window

### Window navigation
bind -r p previous-window
bind -r n next-window
bind -r left previous-window
bind -r right next-window

### Easier config editing
bind e new-window -n config "$EDITOR ~/.tmux.conf"

### Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

### Session restore
set -g @resurrect-dir '~/.tmux/resurrect'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-save-bash-history 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-processes 'ssh psql mysql sqlite3 redis-cli mongo irb pry node npm pnpm yarn python python3 ipython btop htop top watch tail less man vim nvim'

### Automatic save/restore
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'
set -g @continuum-boot 'on'
set -g @continuum-boot-options 'tmux'

run '~/.tmux/plugins/tpm/tpm'
