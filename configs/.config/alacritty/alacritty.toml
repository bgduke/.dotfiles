# ======================
# Alacritty - Minimal
# ======================

[window]
padding = { x = 3, y = 0 }
dynamic_padding = true
decorations = "full"
opacity = 0.95

[scrolling]
history = 10000
multiplier = 3

[font]
size = 11.25

[font.normal]
family = "ZedMono Nerd Font"
style = "Regular"

[font.bold]
family = "ZedMono Nerd Font"
style = "Bold"

[font.italic]
family = "ZedMono Nerd Font"
style = "Italic"

[font.offset]
x = 0
y = 0

[cursor]
unfocused_hollow = true

[cursor.style]
shape = "Block"
blinking = "Never"

[selection]
save_to_clipboard = true

[mouse]
hide_when_typing = true

[keyboard]
bindings = [
  { key = "Plus",   mods = "Control|Shift", action = "IncreaseFontSize" },
  { key = "Minus",  mods = "Control|Shift", action = "DecreaseFontSize" },
  { key = "Key0",   mods = "Control",       action = "ResetFontSize" },
]

# ======================
# Colorscheme - Gruvbox
# ======================

