[font]
size = 11.0

[font.normal]
family = "ZedMono Nerd Font"

[window]
dimensions = { columns = 120, lines = 32 }
padding = { x = 10, y = 10 }
decorations = "None"

[scrolling]
history = 10000

[cursor]
style = { shape = "Beam", blinking = "Never" }
thickness = 0.15

[colors.primary]
foreground = "#EBDBB2"
background = "#282828"

[colors.cursor]
text = "#282828"
cursor = "#FE8019"

[colors.selection]
text = "#282828"
background = "#FABD2F"

[colors.normal]
black = "#282828"
red = "#CC241D"
green = "#98971A"
yellow = "#D79921"
blue = "#458588"
magenta = "#B16286"
cyan = "#689D6A"
white = "#A89984"

[colors.bright]
black = "#928374"
red = "#FB4934"
green = "#B8BB26"
yellow = "#FABD2F"
blue = "#83A598"
magenta = "#D3869B"
cyan = "#8EC07C"
white = "#EBDBB2"

[keyboard]
bindings = [
  { key = "C", mods = "Control|Shift", action = "Copy" },
  { key = "V", mods = "Control|Shift", action = "Paste" },

  { key = "_", mods = "Control|Shift", action = "DecreaseFontSize" },
  { key = "=", mods = "Control|Shift", action = "IncreaseFontSize" },

  # Desabilita zoom padrão aproximado
  { key = "-", mods = "Control", action = "None" },
  { key = "=", mods = "Control", action = "None" },
]
