# -----------------------------
# Starship Prompt Configuration
# -----------------------------

add_newline = false
command_timeout = 1000

format = """
$os $username$hostname\
$directory\
$git_branch$git_status\
$nodejs$dotnet$python$rust$golang\
$time
$character
"""

# -----------------------------
# Core UI
# -----------------------------

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"

[directory]
style = "bold blue"
read_only = " "
truncation_length = 3
truncate_to_repo = true
format = "[$path]($style)[$read_only]($style) "

# -----------------------------
# User / Host
# -----------------------------

[username]
style_user = "bold cyan"
style_root = "bold red"
show_always = false
format = "[$user]($style) "

[hostname]
ssh_only = true
style = "bold purple"
format = "on [$hostname]($style) "

[os]
disabled = false
style = "bold white"

[os.symbols]
Arch = " "
Fedora = " "
Ubuntu = " "
Debian = " "
Manjaro = " "
Linux = " "

# -----------------------------
# Git
# -----------------------------

[git_branch]
symbol = " "
style = "bold purple"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold yellow"
format = "[$all_status$ahead_behind]($style) "
conflicted = "⚔ "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
modified = " "
staged = " "
untracked = " "
deleted = "✖ "

# -----------------------------
# Languages / Runtimes
# -----------------------------

[nodejs]
symbol = " "
style = "bold green"
format = "[$symbol($version)]($style) "
detect_extensions = ["js", "mjs", "cjs", "ts", "mts", "cts"]
detect_files = ["package.json", ".node-version", ".nvmrc"]
detect_folders = []

[dotnet]
symbol = " "
style = "bold blue"
format = "[$symbol($version)]($style) "

[python]
symbol = " "
style = "bold yellow"
format = "[$symbol($version)]($style) "

[rust]
symbol = " "
style = "bold red"
format = "[$symbol($version)]($style) "

[golang]
symbol = " "
style = "bold cyan"
format = "[$symbol($version)]($style) "

# -----------------------------
# Time
# -----------------------------

[time]
disabled = false
style = "bold white"
format = "[󰥔 $time]($style) "
time_format = "%H:%M"

# -----------------------------
# Performance / Cleanliness
# -----------------------------

[cmd_duration]
disabled = true

[line_break]
disabled = false
